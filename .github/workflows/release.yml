name: Release

# Fires when you push a tag like v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write # needed to create the GitHub Release and upload assets

    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential

      - name: Install npm dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The action reads the version from src-tauri/tauri.conf.json.
          # It creates a GitHub Release named after the tag and uploads
          # the platform-specific installers as release assets.
          tagName: ${{ github.ref_name }}
          releaseName: "Reqlify ${{ github.ref_name }}"
          releaseBody: |
            ## What's new
            See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ## Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` or `.exe` installer |
            | Linux    | `.AppImage` or `.deb` package |
          releaseDraft: true
          prerelease: false
